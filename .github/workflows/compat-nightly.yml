name: Compatibility Nightly

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

concurrency:
  group: compat-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  future-matrix:
    runs-on: ubuntu-latest
    name: Future Matrix (PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }})
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.5'
            laravel: '12.*'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout betterauth-core
        uses: actions/checkout@v4
        with:
          repository: MakFly/betterauth-core
          path: betterauth-core
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Fix composer.json repositories
        run: |
          jq '.repositories = [{"type": "path", "url": "./betterauth-core", "options": {"symlink": true}}]' composer.json > composer.tmp.json
          mv composer.tmp.json composer.json

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run CI checks
        run: composer ci

  lowest-dependencies:
    runs-on: ubuntu-latest
    name: Lowest Dependencies (PHP 8.2 / Laravel 11)
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout betterauth-core
        uses: actions/checkout@v4
        with:
          repository: MakFly/betterauth-core
          path: betterauth-core
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Fix composer.json repositories
        run: |
          jq '.repositories = [{"type": "path", "url": "./betterauth-core", "options": {"symlink": true}}]' composer.json > composer.tmp.json
          mv composer.tmp.json composer.json

      - name: Install lowest dependencies
        run: |
          composer require "laravel/framework:11.*" "paragonie/paseto:^3.5" --no-interaction --no-update
          composer require --dev "orchestra/testbench:^9.12" "pestphp/pest:^3.0" --no-interaction --no-update
          composer update --prefer-lowest --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test
